<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Itrixi v11</title>
<style>
:root{--bg:#09031c;--panel:#17102e;--text:#fff;--muted:#aaa0c8;--accent:#8a5cff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0,#25105a,#09031c 55%);color:var(--text);font-family:Inter,system-ui,sans-serif}body{overflow-x:hidden}button{font:inherit}.top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(9,3,28,.86);backdrop-filter:blur(12px)}.back,.pill,.btn{border:1px solid #ffffff22;background:#ffffff12;color:#fff;border-radius:18px;padding:12px 16px;font-weight:800}.pill{padding:9px 13px}.shell{width:min(100%,1000px);margin:auto;padding:14px 14px 96px}.hero{text-align:center;padding:18px}.hero h1{font-size:clamp(2rem,8vw,4rem);margin:0}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:sticky;top:68px;z-index:15;background:#0c0524dd;padding:8px;border-radius:18px}.tab.active{background:linear-gradient(135deg,#8a5cff,#4cc9f0)}.panel{display:none;margin-top:16px}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px}.card{border:1px solid #ffffff18;background:linear-gradient(180deg,#ffffff0f,#ffffff06);border-radius:22px;padding:14px;min-height:185px;display:flex;flex-direction:column;gap:9px}.avatar{width:74px;height:74px;margin:auto;border-radius:28px;box-shadow:0 0 25px var(--glow);position:relative}.avatar:before,.avatar:after{content:'';position:absolute;top:27px;width:7px;height:10px;border-radius:50%;background:white}.avatar:before{left:24px}.avatar:after{right:24px}.name{text-align:center;font-weight:900}.rarity{text-align:center;color:var(--muted);font-size:.82rem}.buy{margin-top:auto;width:100%;border:0;border-radius:14px;padding:11px;background:linear-gradient(135deg,#ffd33d,#ff9f1c);font-weight:900}.buy:disabled{opacity:.45}.selected{outline:3px solid #fff;box-shadow:0 0 0 6px #8a5cff55}.gamewrap{display:grid;place-items:center;min-height:70vh}.gamebox{width:min(100%,960px);aspect-ratio:16/9;position:relative;background:#10082d;border:1px solid #ffffff20;border-radius:24px;overflow:hidden}canvas{width:100%;height:100%;display:block}.hud{position:absolute;inset:12px 12px auto;display:flex;justify-content:space-between;font-weight:900;pointer-events:none}.touch{position:absolute;inset:auto 12px 12px;display:flex;justify-content:space-between}.touch button{width:82px;height:56px;border:0;border-radius:18px;background:#ffffff22;color:#fff;font-size:1.5rem}.start{position:absolute;inset:0;display:grid;place-items:center;background:#08031db8}.start button{font-size:1.2rem;border:0;border-radius:20px;padding:16px 28px;background:linear-gradient(135deg,#8a5cff,#4cc9f0);color:#fff;font-weight:900}.hidden{display:none!important}.note{color:var(--muted);text-align:center}.version{position:fixed;right:8px;bottom:8px;z-index:50;background:#111029;color:#fff;padding:7px 10px;border-radius:10px;font-size:.75rem;border:1px solid #ffffff22}@media(max-width:650px){.tabs{grid-template-columns:repeat(2,1fr);top:66px}.shell{padding-inline:8px}.gamewrap{min-height:calc(100dvh - 165px);align-items:center}.gamebox{width:100%;aspect-ratio:16/9}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.card{min-height:170px;padding:10px}.avatar{width:62px;height:62px;border-radius:23px}.avatar:before,.avatar:after{top:23px}.avatar:before{left:20px}.avatar:after{right:20px}}@media(orientation:landscape) and (max-height:600px){.top{position:fixed;left:0;right:0}.shell{padding-top:70px}.tabs{display:none}.gamewrap{min-height:calc(100dvh - 70px)}.gamebox{height:calc(100dvh - 82px);width:auto;max-width:100%;aspect-ratio:16/9}}
</style></head><body>
<div class="top"><button class="back" onclick="location.href='../../index.html'">← NovaPlay</button><div class="pill">🪙 <span id="coins">300</span></div></div>
<main class="shell"><section class="hero"><h1>ITRIXI</h1><p class="note">Choisis, collectionne et cours.</p></section>
<nav class="tabs"><button class="tab active" data-tab="play">Jouer</button><button class="tab" data-tab="collection">Collection</button><button class="tab" data-tab="shop">Boutique</button><button class="tab" data-tab="stats">Stats</button></nav>
<section id="play" class="panel active"><div class="gamewrap"><div class="gamebox"><canvas id="game" width="960" height="540"></canvas><div class="hud"><span>Score : <b id="score">0</b></span><span>Record : <b id="best">0</b></span></div><div class="touch"><button id="jump">⬆️</button><button id="dash">⚡</button></div><div id="start" class="start"><button id="startBtn">Jouer avec <span id="chosen">Trixi Feu</span></button></div></div></div></section>
<section id="collection" class="panel"><div id="collectionGrid" class="grid"></div></section>
<section id="shop" class="panel"><h2>Boutique de Trixis</h2><p class="note">Achète les Trixis avec les pièces gagnées en jouant.</p><div id="shopGrid" class="grid"></div></section>
<section id="stats" class="panel"><div class="card"><h2>Progression</h2><p>Parties : <b id="plays">0</b></p><p>Meilleur score : <b id="best2">0</b></p><p>Trixis possédés : <b id="ownedCount">3</b>/30</p><button class="btn" id="reset">Réinitialiser</button></div></section></main><div class="version">Itrixi v11</div>
<script>
const TRIXIS=[{"id": "feu", "name": "Trixi Feu", "rarity": "Commun", "a": "#ff7a18", "b": "#ff2d55", "price": 0}, {"id": "eau", "name": "Trixi Eau", "rarity": "Commun", "a": "#56e0ff", "b": "#1677ff", "price": 0}, {"id": "nature", "name": "Trixi Nature", "rarity": "Commun", "a": "#72f28b", "b": "#18864b", "price": 0}, {"id": "roche", "name": "Trixi Roche", "rarity": "Commun", "a": "#c5b7a5", "b": "#66574a", "price": 80}, {"id": "vent", "name": "Trixi Vent", "rarity": "Commun", "a": "#d8fff5", "b": "#51c7a6", "price": 100}, {"id": "electrique", "name": "Trixi Électrique", "rarity": "Rare", "a": "#fff36b", "b": "#f2a900", "price": 140}, {"id": "lune", "name": "Trixi Lune", "rarity": "Rare", "a": "#e6e8ff", "b": "#6563d9", "price": 170}, {"id": "soleil", "name": "Trixi Soleil", "rarity": "Rare", "a": "#fff6aa", "b": "#ff9f1c", "price": 200}, {"id": "glace", "name": "Trixi Glace", "rarity": "Rare", "a": "#e9fdff", "b": "#45b8ef", "price": 230}, {"id": "ombre", "name": "Trixi Ombre", "rarity": "Rare", "a": "#797d99", "b": "#17192d", "price": 250}, {"id": "lave", "name": "Trixi Lave", "rarity": "Épique", "a": "#ff9b4a", "b": "#8b1e13", "price": 300}, {"id": "chat", "name": "Trixi Chat", "rarity": "Épique", "a": "#ffd477", "b": "#a85f20", "price": 320}, {"id": "chien", "name": "Trixi Chien", "rarity": "Épique", "a": "#deb887", "b": "#6e401e", "price": 340}, {"id": "fantome", "name": "Trixi Fantôme", "rarity": "Épique", "a": "#ffffff", "b": "#a46aff", "price": 370}, {"id": "robot", "name": "Trixi Robot", "rarity": "Épique", "a": "#dbe5ef", "b": "#267c7a", "price": 390}, {"id": "ninja", "name": "Trixi Ninja", "rarity": "Épique", "a": "#667085", "b": "#060811", "price": 410}, {"id": "pirate", "name": "Trixi Pirate", "rarity": "Épique", "a": "#ffc857", "b": "#6d2e12", "price": 430}, {"id": "ocean", "name": "Trixi Océan", "rarity": "Épique", "a": "#31d7ea", "b": "#173b8f", "price": 460}, {"id": "dragon", "name": "Trixi Dragon", "rarity": "Légendaire", "a": "#ff6e6e", "b": "#7b1010", "price": 560}, {"id": "galaxie", "name": "Trixi Galaxie", "rarity": "Légendaire", "a": "#dc8cff", "b": "#312477", "price": 600}, {"id": "or", "name": "Trixi Or", "rarity": "Légendaire", "a": "#fff2a6", "b": "#c57b00", "price": 640}, {"id": "roi", "name": "Trixi Roi", "rarity": "Légendaire", "a": "#ffe58a", "b": "#7a3fd0", "price": 680}, {"id": "tempete", "name": "Trixi Tempête", "rarity": "Légendaire", "a": "#d8e0f0", "b": "#3f46a8", "price": 720}, {"id": "neon", "name": "Trixi Néon", "rarity": "Légendaire", "a": "#30f2ff", "b": "#ff36bd", "price": 760}, {"id": "cosmique", "name": "Trixi Cosmique", "rarity": "Mythique", "a": "#69f7ff", "b": "#8d35e8", "price": 850}, {"id": "diamant", "name": "Trixi Diamant", "rarity": "Mythique", "a": "#ffffff", "b": "#16a2c4", "price": 900}, {"id": "arcenciel", "name": "Trixi Arc-en-ciel", "rarity": "Mythique", "a": "#ff718d", "b": "#2ed4db", "price": 950}, {"id": "alien", "name": "Trixi Alien", "rarity": "Mythique", "a": "#c6ff5e", "b": "#527816", "price": 1000}, {"id": "bonbon", "name": "Trixi Bonbon", "rarity": "Mythique", "a": "#ffadd8", "b": "#d92a83", "price": 1050}, {"id": "nova", "name": "Trixi Nova", "rarity": "Mythique", "a": "#ffffff", "b": "#6b2be8", "price": 1200}];
const KEY='itrixi-v11-state';
let state={coins:300,owned:['feu','eau','nature'],selected:'feu',best:0,plays:0};
try{state={...state,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch{}
state.owned=[...new Set(state.owned||['feu','eau','nature'])];
const $=s=>document.querySelector(s), save=()=>localStorage.setItem(KEY,JSON.stringify(state));
function sync(){ $('#coins').textContent=state.coins;$('#best').textContent=state.best;$('#best2').textContent=state.best;$('#plays').textContent=state.plays;$('#ownedCount').textContent=state.owned.length;const t=TRIXIS.find(x=>x.id===state.selected)||TRIXIS[0];$('#chosen').textContent=t.name;renderCollection();renderShop();save() }
function avatar(t){return `<div class="avatar" style="background:radial-gradient(circle at 35% 25%,${t.a},${t.b});--glow:${t.a}"></div>`}
function renderCollection(){const g=$('#collectionGrid');g.innerHTML='';TRIXIS.filter(t=>state.owned.includes(t.id)).forEach(t=>{const c=document.createElement('button');c.className='card '+(state.selected===t.id?'selected':'');c.innerHTML=avatar(t)+`<div class="name">${t.name}</div><div class="rarity">${t.rarity}</div>`;c.onclick=()=>{state.selected=t.id;sync();document.querySelector('[data-tab=play]').click()};g.append(c)})}
function renderShop(){const g=$('#shopGrid');g.innerHTML='';TRIXIS.filter(t=>t.price>0).forEach(t=>{const own=state.owned.includes(t.id),c=document.createElement('article');c.className='card';c.innerHTML=avatar(t)+`<div class="name">${t.name}</div><div class="rarity">${t.rarity}</div><button class="buy" ${own||state.coins<t.price?'disabled':''}>${own?'Possédé':t.price+' 🪙'}</button>`;c.querySelector('button').onclick=()=>{if(!own&&state.coins>=t.price){state.coins-=t.price;state.owned.push(t.id);state.selected=t.id;sync()}};g.append(c)})}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#'+b.dataset.tab).classList.add('active')});
const cv=$('#game'),ctx=cv.getContext('2d');let running=false,score=0,speed=6,player={x:110,y:420,w:42,h:58,vy:0,on:true},obs=[],coins=[];
function resizeCanvas(){const r=cv.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);cv.width=Math.max(320,Math.round(r.width*d));cv.height=Math.max(180,Math.round(r.height*d));ctx.setTransform(d,0,0,d,0,0)}addEventListener('resize',resizeCanvas);
function current(){return TRIXIS.find(t=>t.id===state.selected)||TRIXIS[0]}
function resetGame(){resizeCanvas();running=true;score=0;speed=6;player={x:70,y:cv.clientHeight-82,w:34,h:48,vy:0,on:true};obs=[];coins=[];$('#score').textContent=0;$('#start').classList.add('hidden');state.plays++;save()}
function jump(){if(player.on){player.vy=-13;player.on=false}}function dash(){speed=Math.min(12,speed+2);setTimeout(()=>speed=Math.max(6,speed-2),700)}
$('#jump').onclick=jump;$('#dash').onclick=dash;cv.addEventListener('pointerdown',jump);addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp')jump()});$('#startBtn').onclick=resetGame;
function spawn(){if(Math.random()<.018)obs.push({x:cv.clientWidth+30,y:cv.clientHeight-56,w:28,h:34});if(Math.random()<.012)coins.push({x:cv.clientWidth+20,y:100+Math.random()*(cv.clientHeight-220),r:9})}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function end(){running=false;state.best=Math.max(state.best,Math.floor(score));state.coins+=Math.floor(score/25);save();sync();$('#start').classList.remove('hidden');$('#startBtn').innerHTML=`Rejouer avec <span id="chosen">${current().name}</span>`}
function loop(){const w=cv.clientWidth,h=cv.clientHeight;ctx.clearRect(0,0,w,h);let grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,'#1c0d4c');grad.addColorStop(1,'#09031c');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);ctx.fillStyle='#38217d';for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse((i*.31*w+score*-.15)% (w+180)-80,h*.35+(i%2)*80,55,150,0,0,7);ctx.fill()}ctx.fillStyle='#8c6cff';ctx.fillRect(0,h-28,w,5);
if(running){score+=.12;$('#score').textContent=Math.floor(score);player.vy+=.72;player.y+=player.vy;if(player.y>=h-28-player.h){player.y=h-28-player.h;player.vy=0;player.on=true}spawn();obs.forEach(o=>o.x-=speed);coins.forEach(c=>c.x-=speed);obs=obs.filter(o=>o.x>-60);coins=coins.filter(c=>c.x>-30);for(const o of obs)if(hit(player,o))end();for(const c of coins){if(Math.hypot(player.x+player.w/2-c.x,player.y+player.h/2-c.y)<34){c.x=-99;state.coins++;$('#coins').textContent=state.coins}}
}
const t=current();ctx.fillStyle=t.b;ctx.shadowColor=t.a;ctx.shadowBlur=20;ctx.fillRect(player.x,player.y,player.w,player.h);ctx.shadowBlur=0;ctx.fillStyle='white';ctx.fillRect(player.x+9,player.y+15,5,8);ctx.fillRect(player.x+22,player.y+15,5,8);ctx.fillStyle='#ff4d4d';obs.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));ctx.fillStyle='#ffd528';coins.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,7);ctx.fill()});requestAnimationFrame(loop)}
$('#reset').onclick=()=>{if(confirm('Réinitialiser Itrixi ?')){localStorage.removeItem(KEY);location.reload()}};sync();resizeCanvas();loop();
</script></body></html>
